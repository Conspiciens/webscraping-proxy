name: Run Web Scraper on Schedule

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: '0 0 * * *' 
  # Allows manual triggering from the GitHub Actions tab
  workflow_dispatch: 

jobs:
  test_schedule:
    runs-on: ubuntu-latest

    permissions: 
        contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 ijson 

      - name: Run scraper script
        run: python charger_scraper.py
        # If your script needs environment variables (e.g., API keys), use secrets
        # env:
        #   API_KEY: ${{ secrets.MY_API_KEY }} 

      - name: Commit and push if changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update scraped data" && git push)
        # This step commits any newly scraped data to the repo, ensuring history is clean

